name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      # Direct deployment using Firebase CLI to avoid action input errors
      - run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }} --project thebfgteam-9643a
