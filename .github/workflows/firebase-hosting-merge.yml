name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - run: cd functions && npm ci && cd ..
      # Deployed hosting, firestore, and functions to enable automated self-healing logic
      - run: npx firebase-tools deploy --only hosting,firestore,functions --token ${{ secrets.FIREBASE_TOKEN }} --project thebfgteam-9643a
